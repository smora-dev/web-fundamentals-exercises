<!DOCTYPE html> 
<head>
    <title>Estilo de texto</title>
</head>
<body>
    <p style="color: rgb(0, 238, 255); 
    background-color: rgb(7, 7, 7);
    font-family: Arial, Helvetica, sans-serif;
    font-size: 1em;">
    Este es mi texto</p>
    <p style="margin: 20px;
    border: 3px;
    border-color: aqua;
    border-style: solid;
    padding: 10px;
    width: 400px;">
    Este es otro estilo </p>
</body>
</html>
