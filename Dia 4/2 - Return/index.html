<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Return</title>
</head>
<body>
    <script>
        function sumar(){
            resultado = 2 + 3;
            return resultado;
        }
        function nombre1(){
            nombre = "Juan";
            return nombre; 
        }
        let numero = "El numero es " + sumar();
        alert(numero);

        let nombre = "El nombre es " + nombre1();
        alert(nombre);
    </script>
</body>
</html>
